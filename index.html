<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Scholarship Project</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
 
  <!-- TOP NAV -->
  <nav class="top-nav">
    <span class="nav-logo">SpotTheFake</span>
  </nav>
 
  <!-- INSTRUCTION BANNER -->
  <div class="instruction-banner">
    One of these posts is fake. Scroll down and tap it.
  </div>
 
  <!-- FEED -->
  <main class="feed" id="feed"></main>
 
  <!-- RESULT SCREEN (hidden until guess) -->
  <div class="result-screen hidden" id="result-screen">
    <div class="result-box">
      <div class="result-icon" id="result-icon"></div>
      <h2 id="result-title"></h2>
      <p id="result-body"></p>
      <button class="btn-play-again" id="play-again">Play Again</button>
    </div>
  </div>
 
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
