<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram</title>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css"/>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────── -->
  <nav class="top-nav">
    <span class="nav-logo">SpotTheFake</span>
  </nav>

  <!-- ── INSTRUCTION ─────────────────────────────── -->
  <div class="banner">
    One of these posts is fake. Scroll down and tap it.
  </div>

  <!-- ── POSTS (filled in by app.js) ────────────── -->
  <main class="feed" id="feed"></main>

  <!-- ── RESULT POPUP ────────────────────────────── -->
  <div class="result-screen hidden" id="result-screen">
    <div class="result-box">
      <div class="result-icon" id="r-icon"></div>
      <h2 id="r-title"></h2>
      <p id="r-body"></p>
      <button class="play-again" id="play-again">Play Again</button>
    </div>
  </div>

  <!-- ── SCRIPTS (data must load before app) ─────── -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
