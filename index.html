<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpotTheFake</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg-card:#1a1a1a;--bg-el:#262626;
  --border:#2a2a2a;--text:#f5f5f5;--muted:#888;
  --green:#4ade80;--red:#f87171;
  --grad:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
  --max:480px;--nav:52px;
  --font:'Sora',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding-top:var(--nav);-webkit-font-smoothing:antialiased}
.top-nav{position:fixed;top:0;left:0;right:0;height:var(--nav);background:rgba(0,0,0,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;z-index:100}
.nav-logo{font-size:20px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.banner{max-width:var(--max);margin:0 auto;padding:12px 16px;font-size:13px;color:var(--muted);text-align:center;border-bottom:1px solid var(--border)}
.feed{max-width:var(--max);margin:0 auto}
.post{border-bottom:1px solid var(--border);animation:fi .3s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.post-header{display:flex;align-items:center;gap:10px;padding:10px 14px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--bg-el);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.username{font-size:13.5px;font-weight:600}
.location{font-size:11px;color:var(--muted);margin-top:1px}
.post-img{width:100%;aspect-ratio:1/1;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:80px}
.post-img img{width:100%;height:100%;object-fit:cover;display:block}
.actions{display:flex;gap:2px;padding:8px 10px 4px}
.act{background:none;border:none;color:var(--text);padding:5px;display:flex;align-items:center}
.act svg{width:22px;height:22px}
.act.sp{margin-left:auto}
.likes{padding:2px 14px;font-size:13px;font-weight:600}
.caption{padding:4px 14px 6px;font-size:13px;line-height:1.5}
.caption strong{font-weight:600;margin-right:5px}
.time{padding:0 14px 10px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.guess-wrap{padding:10px 14px 18px}
.guess-btn{width:100%;padding:11px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-el);color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s}
.guess-btn:hover:not(:disabled){border-color:var(--muted);color:var(--text)}
.guess-btn:disabled{cursor:not-allowed;opacity:.4}
.guess-btn.correct{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08);opacity:1}
.guess-btn.wrong{border-color:var(--red);color:var(--red);background:rgba(248,113,113,.08);opacity:1}
.result-screen{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.result-screen.hidden{display:none!important}
.result-box{background:var(--bg-card);border:1px solid #333;border-radius:18px;padding:32px 24px;max-width:360px;width:100%;text-align:center;animation:pop .25s ease}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.r-icon{font-size:52px;margin-bottom:12px}
.result-box h2{font-size:22px;font-weight:700;margin-bottom:10px}
.result-box p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
.play-again{width:100%;padding:13px;background:var(--grad);border:none;border-radius:10px;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer}
.play-again:hover{opacity:.88}
@media(max-width:520px){:root{--max:100%}}
</style>
</head>
<body>
 
<nav class="top-nav"><span class="nav-logo">SpotTheFake</span></nav>
<div class="banner">One of these posts is fake. Scroll down and tap it.</div>
<main class="feed" id="feed"></main>
 
<div class="result-screen hidden" id="result-screen">
  <div class="result-box">
    <div class="r-icon" id="r-icon"></div>
    <h2 id="r-title"></h2>
    <p id="r-body"></p>
    <button class="play-again" id="play-again">Play Again</button>
  </div>
</div>
 
<script>
const ROUNDS = [
  [
    {id:"r1p1",username:"nasa",avatar:"🚀",location:"Kennedy Space Center",img:"🌌",likes:2481392,caption:"Earth from 400 miles up. Our astronauts aboard the ISS captured this view of the Pacific Ocean.",time:"3 hours ago",fake:false,clue:""},
    {id:"r1p2",username:"natgeo",avatar:"🦁",location:"Serengeti, Tanzania",img:"🦁",likes:1204830,caption:"A lion family at dusk. The Serengeti remains one of the last places this scene plays out daily.",time:"5 hours ago",fake:false,clue:""},
    {id:"r1p3",username:"n4sa_official",avatar:"🚀",location:"Washington D.C.",img:"🌍",likes:847,caption:"NASA has announced FREE tickets to watch a rocket launch!! Click the link in our bio before they run out!!!",time:"1 hour ago",fake:true,clue:"The username uses '4' instead of 'a' — a classic impersonation trick. NASA never gives away free launch tickets on Instagram. Only 847 likes for a supposed NASA account is a huge red flag."},
    {id:"r1p4",username:"whitehouse",avatar:"🏛️",location:"Washington, D.C.",img:"🏛️",likes:487291,caption:"The President today signed the new infrastructure bill — the largest investment in American roads and bridges in decades.",time:"6 hours ago",fake:false,clue:""},
    {id:"r1p5",username:"nike",avatar:"👟",location:"Beaverton, Oregon",img:"✔️",likes:892041,caption:"Just do it. New Air Max — dropping this Friday. Link in bio.",time:"4 hours ago",fake:false,clue:""}
  ],
  [
    {id:"r2p1",username:"who",avatar:"🏥",location:"Geneva, Switzerland",img:"🩺",likes:391042,caption:"Hand hygiene remains one of the most effective ways to prevent infection. Wash hands for at least 20 seconds.",time:"2 hours ago",fake:false,clue:""},
    {id:"r2p2",username:"worldhealthorg",avatar:"🏥",location:"Geneva",img:"💊",likes:3201,caption:"BREAKING: WHO confirms drinking hot lemon water every morning CURES all viral infections. Share before they delete this!!",time:"45 minutes ago",fake:true,clue:"WHO would never make an unscientific cure claim. 'Share before they delete this' is conspiracy-bait language. Real WHO posts cite sources and have millions of likes — not 3,201."},
    {id:"r2p3",username:"nytimes",avatar:"📰",location:"New York, NY",img:"🗞️",likes:214830,caption:"The Federal Reserve held interest rates steady today, citing ongoing uncertainty in global markets.",time:"1 hour ago",fake:false,clue:""},
    {id:"r2p4",username:"apple",avatar:"🍎",location:"Cupertino, CA",img:"📱",likes:1032840,caption:"Shot on iPhone. Every detail, every moment. #ShotOniPhone",time:"8 hours ago",fake:false,clue:""},
    {id:"r2p5",username:"natgeo",avatar:"🌿",location:"Amazon Basin, Brazil",img:"🌿",likes:988320,caption:"The Amazon rainforest is home to 10% of all species on Earth. Protecting it matters.",time:"3 hours ago",fake:false,clue:""}
  ],
  [
    {id:"r3p1",username:"espn",avatar:"🏀",location:"Bristol, CT",img:"🏀",likes:703912,caption:"What a finish. Buzzer beater to send it to overtime. Full highlights on ESPN+ now.",time:"2 hours ago",fake:false,clue:""},
    {id:"r3p2",username:"tesla",avatar:"⚡",location:"Austin, TX",img:"🚗",likes:1120400,caption:"Model 3. Designed for the road ahead. Order yours today.",time:"5 hours ago",fake:false,clue:""},
    {id:"r3p3",username:"google",avatar:"🔍",location:"Mountain View, CA",img:"🔍",likes:882041,caption:"Search smarter. Try the new AI-powered search features available now.",time:"4 hours ago",fake:false,clue:""},
    {id:"r3p4",username:"n1ke_giveaway_official",avatar:"👟",location:"Nike HQ",img:"🎁",likes:214,caption:"HUGE GIVEAWAY! Nike is giving away 500 pairs of shoes! Follow us, like this post, and tag 3 friends. Winners announced tomorrow!",time:"30 minutes ago",fake:true,clue:"The username swaps 'i' for '1'. Real Nike would have millions of likes on a giveaway post, not 214. Follow + like + tag is the most common fake giveaway formula on social media."},
    {id:"r3p5",username:"nps_gov",avatar:"🏕️",location:"Yellowstone National Park",img:"🏔️",likes:329810,caption:"Old Faithful erupted 17 times today. Plan your visit at nps.gov. #Yellowstone",time:"6 hours ago",fake:false,clue:""}
  ]
];
 
let round = [], guessed = false;
 
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":n}
 
function pick(){
  const i = Math.floor(Math.random()*ROUNDS.length);
  round = [...ROUNDS[i]].sort(()=>Math.random()-.5);
}
 
function render(){
  document.getElementById("feed").innerHTML = round.map(p=>`
    <article class="post">
      <div class="post-header">
        <div class="avatar">${p.avatar}</div>
        <div>
          <p class="username">${p.username}</p>
          ${p.location?`<p class="location">${p.location}</p>`:""}
        </div>
      </div>
      <div class="post-img">${p.img}</div>
      <div class="actions">
        <button class="act" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
        <button class="act" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
        <button class="act sp" tabindex="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
      </div>
      <p class="likes">${fmt(p.likes)} likes</p>
      <p class="caption"><strong>${p.username}</strong> ${p.caption}</p>
      <p class="time">${p.time}</p>
      <div class="guess-wrap">
        <button class="guess-btn" data-id="${p.id}">This post is fake</button>
      </div>
    </article>
  `).join("");
}
 
function guess(id){
  if(guessed) return;
  guessed = true;
  const post = round.find(p=>p.id===id);
  round.forEach(p=>{
    const btn = document.querySelector(`[data-id="${p.id}"]`);
    if(!btn) return;
    btn.disabled = true;
    if(p.id===id){
      btn.classList.add(post.fake?"correct":"wrong");
      btn.textContent = post.fake?"✓ Correct — this is fake":"✗ Wrong — this is real";
    } else if(p.fake){
      btn.classList.add("correct");
      btn.textContent = "← This was the fake one";
      btn.disabled = false;
      btn.style.opacity = "1";
      btn.style.cursor = "default";
    }
  });
  const fake = round.find(p=>p.fake);
  setTimeout(()=>{
    document.getElementById("r-icon").textContent = post.fake?"🎉":"😬";
    document.getElementById("r-title").textContent = post.fake?"Got it!":"Not quite.";
    document.getElementById("r-body").textContent = post.fake
      ? fake.clue
      : "The fake post was @"+fake.username+". "+fake.clue;
    document.getElementById("result-screen").classList.remove("hidden");
  }, 700);
}
 
document.addEventListener("DOMContentLoaded",()=>{
  document.body.addEventListener("click",e=>{
    const btn = e.target.closest(".guess-btn");
    if(btn && !btn.disabled) guess(btn.dataset.id);
  });
  document.getElementById("play-again").addEventListener("click",()=>{
    guessed = false;
    document.getElementById("result-screen").classList.add("hidden");
    pick();
    render();
    window.scrollTo({top:0,behavior:"smooth"});
  });
  pick();
  render();
});
</script>
</body>
</html>
